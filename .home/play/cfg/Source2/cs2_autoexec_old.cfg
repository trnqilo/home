clear;
unbindall;
sensitivity 2.000000;
zoom_sensitivity_ratio 1.000000;
option_duck_method false;
option_speed_method false;
cl_sniper_auto_rezoom true;
cl_silencer_mode 0;
cl_showloadout true;
bind mouse_x yaw;
bind mouse_y pitch;
bind mouse1 +attack;
bind mouse2 +attack2;
bind ` +showscores;
bind / toggleconsole;
bind mwheelup slot1;
bind mwheeldown slot2;
bind mouse4 slot3;
bind shift +duck;
bind space +jump;
bind ctrl +sprint;
bind rctrl +sprint;
bind lwin +sprint;
bind mouse5 +sprint;
bind 6 slot5;
bind q slot6;
bind tab slot7;
bind rshift slot7;
bind 5 slot8;
bind 4 slot9;
bind g slot10;
bind h slot11;
bind y slot12;
bind r +reload;
bind e +use;
bind 1 +use;
bind n drop;
bind w +forward;
bind mouse3 +forward;
bind s +back;
bind a +left;
bind d +right;
bind t player_ping;
bind f +lookatweapon;
bind l ignoremsg;
bind . teammenu;
bind p +spray_menu;
bind b buymenu;
bind i "toggle cl_showfps";
bind backspace messagemode;
bind enter messagemode2;
bind v +voicerecord;
bind semicolon "toggle volume";
bind "'" voice_modenable_toggle;
bind escape cancelselect;
alias autorun "+forward; bind = manualrun";
alias manualrun "-forward; bind = autorun";
manualrun;
alias +duckjump "+jump; +duck";
alias -duckjump "-duck; -jump";
bind alt +duckjump;
alias rez "exec autoexec";
bind \ rez;
viewmodel_offset_x -2.0;
viewmodel_offset_y -2.0;
viewmodel_offset_z -1.9;
crosshair 1;
cl_crosshairstyle 4;
cl_crosshaircolor 5;
cl_crosshairdot 1;
cl_crosshair_t 0;
cl_crosshairgap -10;
cl_crosshairusealpha 1;
cl_fixedcrosshairgap 1;
cl_crosshair_outlinethickness 0;
cl_crosshair_drawoutline 0;
cl_crosshairthickness 0.1;
alias black "cl_crosshaircolor_r 0; cl_crosshaircolor_g 0; cl_crosshaircolor_b 0";
alias white "cl_crosshaircolor_r 255; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255";
alias cyan "cl_crosshaircolor_r 40; cl_crosshaircolor_g 220; cl_crosshaircolor_b 240"
alias scope "bind - retcyan; cl_crosshairsize 1024; cl_crosshairalpha 200; black";
alias retcyan "bind - retwhite; cl_crosshairsize 3; cl_crosshairalpha 255; cyan";
alias retwhite "bind - scope; cl_crosshairsize 3; cl_crosshairalpha 255; white";
scope;
alias radios "bind c radio1; bind z radio2; bind x radio3";
alias controller "bind x_axis rightleft; bind y_axis !forwardback; bind u_axis yaw; bind r_axis pitch";
alias loca "connect localhost";
alias dc disconnect;
alias qq quit;
player_nevershow_communityservermessage 1;
con_enable true;
safezonex 0.9;
safezoney 1.0;
cl_hide_avatar_images 1;
cl_hud_radar_scale 1.300000;
cl_radar_always_centered false;
cl_radar_icon_scale_min 0.600000;
cl_radar_rotate true;
cl_radar_scale 0.5;
cl_radar_square_with_scoreboard true;
snd_mute_losefocus 0;
net_allow_multicast false;
violence_ablood false;
violence_agibs false;
violence_hblood false;
violence_hgibs false;
echo "# CS2";
